name: Deploy Discord Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run every 5 hours to keep the bot alive (GitHub Actions has a 6-hour limit)
    - cron: '0 */5 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Set timeout to just under 6 hours
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run bot
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: |
        python bot.py
